<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Berlangganan Webinar</title>
    <!-- Menghubungkan ke file CSS -->
    <link rel="stylesheet" href="../CSS/la2.css">
    <!-- Menggunakan font Google 'Inter' untuk desain modern -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <div class="form-header">
                <h2>Berlangganan Webinar</h2>
            </div>
            <form action="#" method="POST">
                
                <!-- Nama -->
                <div class="form-row">
                    <div class="label-col">
                        <label>Nama</label>
                    </div>
                    <div class="input-col multi-col-2">
                        <div class="input-group">
                            <input type="text" id="nama-depan" name="nama-depan" required>
                            <span class="sub-label">Nama Depan</span>
                        </div>
                        <div class="input-group">
                            <input type="text" id="nama-belakang" name="nama-belakang" required>
                            <span class="sub-label">Nama Belakang</span>
                        </div>
                    </div>
                </div>

                <!-- E-mail -->
                <div class="form-row">
                    <div class="label-col">
                        <label for="email">E-mail</label>
                    </div>
                    <div class="input-col">
                        <div class="input-group">
                            <input type="email" id="email" name="email" placeholder="contoh: nama@contoh.com" required>
                            <span class="sub-label">contoh@contoh.com</span>
                        </div>
                    </div>
                </div>

                <!-- Telepon Kantor -->
                <div class="form-row">
                    <div class="label-col">
                        <label>Telepon Kantor</label>
                    </div>
                    <div class="input-col multi-col-phone">
                        <div class="input-group">
                            <input type="text" id="kode-area" name="kode-area" class="kode-area">
                            <span class="sub-label">Kode Area</span>
                        </div>
                        <span class="separator">-</span>
                        <div class="input-group flex-1">
                            <input type="text" id="nomor-telepon" name="nomor-telepon">
                            <span class="sub-label">Nomor Telepon</span>
                        </div>
                    </div>
                </div>

                <!-- Perusahaan -->
                <div class="form-row">
                    <div class="label-col">
                        <label for="perusahaan">Perusahaan</label>
                    </div>
                    <div class="input-col">
                        <div class="input-group full-width-input">
                            <input type="text" id="perusahaan" name="perusahaan">
                        </div>
                    </div>
                </div>

                <!-- Alamat Perusahaan -->
                <div class="form-row">
                    <div class="label-col">
                        <label>Alamat Perusahaan</label>
                    </div>
                    <div class="input-col address-col">
                        <div class="input-group full-width">
                            <input type="text" id="nama-jalan" name="nama-jalan">
                            <span class="sub-label">Nama Jalan</span>
                        </div>
                        <div class="input-group full-width">
                            <input type="text" id="nama-jalan-2" name="nama-jalan-2">
                            <span class="sub-label">Nama Jalan Baris Ke-2</span>
                        </div>
                        <div class="multi-col-2">
                            <div class="input-group">
                                <input type="text" id="kota" name="kota">
                                <span class="sub-label">Kabupaten / Kota</span>
                            </div>
                            <div class="input-group">
                                <input type="text" id="negara" name="negara">
                                <span class="sub-label">Negara</span>
                            </div>
                        </div>
                        <div class="input-group half-width">
                            <input type="text" id="kode-pos" name="kode-pos">
                            <span class="sub-label">Kode Pos</span>
                        </div>
                    </div>
                </div>

                <!-- Situs Web Perusahaan -->
                <div class="form-row">
                    <div class="label-col">
                        <label for="situs-web">Situs Web<br>Perusahaan</label>
                    </div>
                    <div class="input-col">
                        <div class="input-group full-width-input">
                            <input type="text" id="situs-web" name="situs-web">
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="form-row submit-row">
                    <div class="label-col"></div>
                    <div class="input-col">
                        <button type="submit" class="btn-submit">Kirim</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
